name: Deploy Landing

on:
  push:
    branches:
      - main
    paths:
      - 'landing/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-landing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -x
            echo "==== DIAGNÓSTICO DO SERVIDOR ===="
            echo "1. Listando containers ativos e inativos:"
            sudo docker ps -a
            
            echo "2. Processos escutando na porta 80 e 443:"
            sudo ss -tulpn | grep -E ':80|:443' || true
            
            echo "3. Fazendo requisição HTTP local (cabeçalhos) na porta 80:"
            curl -I http://localhost || true
            
            echo "4. Informações de rede do docker:"
            sudo docker network ls
            echo "==== FIM DO DIAGNÓSTICO ===="
            
            GH_USER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_URI="ghcr.io/$GH_USER/ubus-web-landing:latest"
            
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u $GH_USER --password-stdin
            sudo docker pull $IMAGE_URI
            sudo docker rm -f ubus-landing || true
            
            echo "Tentando subir o container ubus-landing..."
            sudo docker run -d \
              --name ubus-landing \
              -p 80:80 \
              --restart unless-stopped \
              $IMAGE_URI || {
                echo "ERRO: O container falhou ao iniciar!"
                echo "Logs do container:"
                sudo docker logs ubus-landing || true
                exit 1
              }
            
            sudo docker image prune -f
